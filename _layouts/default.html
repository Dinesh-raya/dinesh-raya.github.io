<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    :root {
      --bg-color: #f4f6f8;
      --card-bg: #ffffff;
      --text-main: #111111;
      --border-radius: 20px;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
    }
    header {
      background: #000000;
      color: #ffffff;
      padding: 20px 40px;
      font-size: 28px;
      font-weight: 700;
    }
    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .card-row {
      background: var(--card-bg);
      border-radius: var(--border-radius);
      padding: 30px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      margin-bottom: 30px;
      border: 1px solid #eef1f4;
    }
    .item-card {
      background: #ffffff;
      border: 1px solid #eef2f6;
      border-radius: 16px;
      padding: 20px;
      width: 140px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }
    .icon-box {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
    }
    .badge {
      background: #000;
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
      margin-top: 6px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <header>{{ site.title }}</header>

  <div class="container">
    {{ content }}
  </div>

</body>
</html>
