<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <style>
    :root {
      --bg-color: #f4f6f8;
      --card-bg: #ffffff;
      --text-main: #111111;
      --border-radius: 20px;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
    }
    header {
      background: #000000;
      color: #ffffff;
      padding: 20px 40px;
      font-size: 28px;
      font-weight: 700;
    }
    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .card-row {
      background: var(--card-bg);
      border-radius: var(--border-radius);
      padding: 30px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      box-shadow: 0 4px 6px rgba(0,0,0,0.02);
      margin-bottom: 30px;
      border: 1px solid #eef1f4;
    }
    .item-card {
      background: #ffffff;
      border: 1px solid #eef2f6;
      border-radius: 16px;
      padding: 20px;
      width: 140px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .item-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    }
    .icon-box {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
    }
    .badge {
      background: #000;
      color: #fff;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      display: inline-block;
      margin-top: 6px;
      text-transform: uppercase;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 400;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    nav a:hover {
      opacity: 1;
    }
    nav .nav-links {
      display: flex;
      gap: 24px;
    }

    footer {
      border-top: 1px solid #eef1f4;
      margin-top: 60px;
      padding: 24px 0 40px;
      text-align: center;
      font-size: 14px;
      color: #666;
    }
    footer a {
      color: #666;
      text-decoration: none;
      margin: 0 12px;
      transition: color 0.2s;
    }
    footer a:hover {
      color: #111;
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="/" class="site-title"><img src="/raya.svg" alt="RAYA" style="height:32px;display:block"></a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/admin/">Manage</a>
      </div>
    </nav>
  </header>

  <div class="container">
    {{ content }}
  </div>

  <footer>
    <a href="/">Home</a>
    <a href="/admin/">Admin</a>
    <a href="/about/">About</a>
    <a href="/contact/">Contact</a>
    <a href="/privacy/">Privacy</a>
    <a href="/terms/">Terms</a>
    <span>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</span>
  </footer>

</body>
</html>
