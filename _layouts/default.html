<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <script>
    (function(){var s=localStorage.getItem('raya-theme');if(s==='dark'){document.documentElement.setAttribute('data-theme','dark')}})();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:title" content="{{ page.title }} | {{ site.title }}">
  <meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  <meta name="twitter:card" content="summary">
  <link rel="icon" type="image/svg+xml" href="/raya.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F3F3F3;
      --surface: #ffffff;
      --surface-alt: #fdfdfd;
      --text: #111111;
      --text-secondary: #333333;
      --text-muted: #666666;
      --text-light: #888888;
      --border: #dddddd;
      --border-light: #eeeeee;
      --card-shadow: 0 2px 4px rgba(0,0,0,0.02);
      --card-shadow-hover: 0 8px 12px rgba(0,0,0,0.05);
      --inline-code-bg: #f0f0f0;
      --blockquote-bg: #f8f8f8;
      --blockquote-color: #555555;
      --table-header-bg: #f8f8f8;
      --table-border: #e0e0e0;
      --h3-card-color: #111827;
      --icon-bg: #ffffff;
      --copyright-color: #666666;
      --footer-link: #cccccc;
      --back-link: #666666;
      --back-link-hover: #111111;
      --link-color: #000000;
      --hr-color: #eeeeee;
      --border-radius: 20px;
      --toggle-bg: #333333;
    }
    [data-theme="dark"] {
      --bg: #121212;
      --surface: #1e1e1e;
      --surface-alt: #252525;
      --text: #e0e0e0;
      --text-secondary: #cccccc;
      --text-muted: #999999;
      --text-light: #aaaaaa;
      --border: #444444;
      --border-light: #555555;
      --card-shadow: 0 2px 4px rgba(0,0,0,0.3);
      --card-shadow-hover: 0 8px 12px rgba(0,0,0,0.4);
      --inline-code-bg: #2a2a2a;
      --blockquote-bg: #1e1e1e;
      --blockquote-color: #aaaaaa;
      --table-header-bg: #2a2a2a;
      --table-border: #444444;
      --h3-card-color: #e0e0e0;
      --icon-bg: #2a2a2a;
      --copyright-color: #888888;
      --footer-link: #999999;
      --back-link: #aaaaaa;
      --back-link-hover: #ffffff;
      --link-color: #80b4ff;
      --hr-color: #444444;
      --toggle-bg: #555555;
    }
    * {
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #000000;
      color: #ffffff;
      padding: 20px 40px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px;
      flex: 1;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav a, .theme-toggle {
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 400;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    nav a:hover, .theme-toggle:hover {
      opacity: 1;
    }
    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      font-size: 18px;
      line-height: 1;
    }
    .back-nav {
      margin-bottom: 24px;
    }
    .back-nav a {
      color: var(--back-link);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .back-nav a:hover {
      color: var(--back-link-hover);
    }

    footer {
      background: #000;
      color: #fff;
      padding: 20px 40px;
      font-size: 14px;
    }
    footer a {
      color: var(--footer-link);
      text-decoration: none;
      transition: color 0.2s;
    }
    footer a:hover {
      color: #fff;
    }
    @media (max-width: 768px) {
      header {
        padding: 16px 20px;
      }
      nav {
        flex-wrap: wrap;
        gap: 8px;
      }
      nav a, .theme-toggle {
        font-size: 14px;
      }
      .theme-toggle {
        font-size: 16px;
      }
      footer {
        padding: 20px 10px;
      }
      footer a {
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="/"><img src="/raya.svg" alt="RAYA" style="height:40px;display:block"></a>
      <div style="display:flex;align-items:center;gap:16px;">
        <a href="/">Home</a>
        <a href="/cheatsheet/">Cheatsheet</a>
        <a href="/claude-leak/">Claude Leak</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">&#9790;</button>
      </div>
    </nav>
  </header>

  <div class="container">
    {% unless page.url == '/' %}
    <div class="back-nav">
      <a href="#" onclick="history.back(); return false;">&larr; Back</a>
    </div>
    {% endunless %}
    {{ content }}
  </div>

  <footer>
    <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
      <a href="/about/">About Us</a>
      <a href="/contact/">Contact Us</a>
      <a href="/privacy/">Privacy Policy</a>
      <a href="/terms/">Terms &amp; Conditions</a>
    </div>
    <div style="text-align: center; margin-top: 10px; color: var(--copyright-color); font-size: 0.8rem;">
      &copy; {{ site.time | date: '%Y' }} {{ site.title }}
    </div>
  </footer>

  <script>
    (function() {
      var html = document.documentElement;
      var stored = localStorage.getItem('raya-theme');
      if (stored === 'dark') {
        html.setAttribute('data-theme', 'dark');
      }
      var btn = document.getElementById('themeToggle');
      if (btn) {
        btn.addEventListener('click', function() {
          var isDark = html.getAttribute('data-theme') === 'dark';
          if (isDark) {
            html.removeAttribute('data-theme');
            localStorage.setItem('raya-theme', 'light');
          } else {
            html.setAttribute('data-theme', 'dark');
            localStorage.setItem('raya-theme', 'dark');
          }
        });
      }
    })();
  </script>

</body>
</html>
