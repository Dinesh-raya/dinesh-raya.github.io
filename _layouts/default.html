<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f4f6f8;
      --card-bg: #ffffff;
      --text-main: #111111;
      --border-radius: 20px;
    }
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #000000;
      color: #ffffff;
      padding: 20px 40px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px;
      flex: 1;
    }
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 400;
      opacity: 0.8;
      transition: opacity 0.2s;
    }
    nav a:hover {
      opacity: 1;
    }
    nav .nav-links {
      display: flex;
      gap: 24px;
    }

    footer {
      background: #000;
      color: #fff;
      padding: 24px 40px;
      text-align: center;
      font-size: 14px;
    }
    footer a {
      color: #ccc;
      text-decoration: none;
      margin: 0 14px;
      transition: color 0.2s;
    }
    footer a:hover {
      color: #fff;
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="/"><img src="/raya.svg" alt="RAYA" style="height:32px;display:block"></a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/admin/">Manage</a>
      </div>
    </nav>
  </header>

  <div class="container">
    {{ content }}
  </div>

  <footer>
    <a href="/">Home</a>
    <a href="/admin/">Admin</a>
    <a href="/about/">About</a>
    <a href="/contact/">Contact</a>
    <a href="/privacy/">Privacy</a>
    <a href="/terms/">Terms</a>
    <span>&copy; {{ site.time | date: '%Y' }} {{ site.title }}</span>
  </footer>

</body>
</html>
