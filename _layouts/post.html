---
layout: default
---
<style>
  .post-header {
    margin-bottom: 40px;
  }
  .post-header .back-link {
    display: inline-block;
    margin-bottom: 20px;
    color: #666;
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
  }
  .post-header .back-link:hover {
    color: #111;
  }
  .post-header h1 {
    font-size: 2em;
    margin: 0 0 12px;
    line-height: 1.3;
  }
  .post-header .meta {
    font-size: 14px;
    color: #888;
  }
  .post-content {
    font-size: 17px;
    line-height: 1.7;
    color: #333;
    max-width: 720px;
  }
  .post-content h2 {
    font-size: 1.5em;
    margin: 36px 0 16px;
    color: #111;
  }
  .post-content h3 {
    font-size: 1.2em;
    margin: 28px 0 12px;
    color: #111;
  }
  .post-content p {
    margin: 0 0 20px;
  }
  .post-content ul, .post-content ol {
    margin: 0 0 20px;
    padding-left: 24px;
  }
  .post-content li {
    margin-bottom: 8px;
  }
  .post-content blockquote {
    margin: 24px 0;
    padding: 16px 24px;
    border-left: 4px solid #000;
    background: #f8f8f8;
    border-radius: 0 8px 8px 0;
    color: #555;
  }
  .post-content blockquote p:last-child {
    margin-bottom: 0;
  }
  .post-content code {
    background: #f0f0f0;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
  }
  .post-content pre {
    background: #1e1e1e;
    color: #d4d4d4;
    padding: 20px;
    border-radius: 10px;
    overflow-x: auto;
    font-size: 14px;
    line-height: 1.5;
    margin: 24px 0;
  }
  .post-content pre code {
    background: none;
    padding: 0;
    border-radius: 0;
    font-size: inherit;
  }
  .post-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 24px 0;
    font-size: 15px;
  }
  .post-content th, .post-content td {
    border: 1px solid #e0e0e0;
    padding: 10px 14px;
    text-align: left;
  }
  .post-content th {
    background: #f8f8f8;
    font-weight: 600;
  }
  .post-content hr {
    border: none;
    border-top: 1px solid #eee;
    margin: 40px 0;
  }
  .post-content img {
    max-width: 100%;
    border-radius: 10px;
    margin: 24px 0;
  }
  .post-content a {
    color: #000;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
</style>

<article>
  <div class="post-header">
    <a class="back-link" href="/">&larr; Back to Home</a>
    <h1>{{ page.title }}</h1>
    <div class="meta">
      {{ page.date | date: "%B %d, %Y" }}
      {% if page.description %}
      &middot; {{ page.description }}
      {% endif %}
    </div>
  </div>

  <div class="post-content">
    {{ content }}
  </div>
</article>
